<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none}
html,body{height:100%;width:100%;overflow:hidden;background:#0a0a0f;position:fixed;top:0;left:0}
:root{--acc:#d4ff4e;--blue:#4ab8ff;--purple:#a78bfa;--orange:#fb923c;--green:#22c55e;--red:#f87171;--muted:#52527a;--border:#1e1e2e;--card:#13131e;--dark:#0d0d18;--text:#e8e8f8}
.shell{position:fixed;inset:0;background:#0a0a0f;display:flex;flex-direction:column;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;padding-bottom:env(safe-area-inset-bottom)}
.topbar{flex-shrink:0;background:#0a0a0f;border-bottom:1px solid var(--border);padding:12px 16px 10px}
.topbar-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.app-title{font-size:22px;font-weight:700;letter-spacing:1px;color:var(--acc)}.app-title span{color:var(--text)}
.streak-badge{display:flex;align-items:center;gap:5px;background:var(--card);border-radius:20px;padding:5px 12px;border:1px solid var(--border)}
.streak-num{font-size:16px;font-weight:700;color:var(--text)}.streak-icon{font-size:20px;line-height:1}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.stat{background:var(--card);border-radius:10px;padding:7px 0;text-align:center}
.stat-n{font-size:20px;font-weight:700;color:var(--acc)}.stat-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.week-row{flex-shrink:0;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:8px 16px;background:#0a0a0f;border-bottom:1px solid var(--border);touch-action:pan-x}
.week-row::-webkit-scrollbar{display:none}
.wbtn{flex-shrink:0;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit}
.wbtn.on{background:var(--acc);border-color:var(--acc);color:#000;font-weight:700}
.content-area{flex:1;overflow:hidden;position:relative}
.view{position:absolute;inset:0;display:none;flex-direction:column}.view.on{display:flex}
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:none;touch-action:pan-y;padding:10px 12px 16px}
.scroll-area::-webkit-scrollbar{display:none}
.day-card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:8px;overflow:hidden}
.day-card.today{border-color:var(--acc);border-width:1.5px}.day-card.rest{opacity:.4;pointer-events:none}
.day-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
.dbadge{width:40px;height:40px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.dbadge .dd{font-size:17px;font-weight:700;line-height:1}.dbadge .mm{font-size:9px;text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.bc{background:#0c2233;color:var(--blue)}.bf{background:#1e0d33;color:var(--purple)}.bb{background:#2d0a22;color:#f472b6}.bl{background:#2d1500;color:var(--orange)}.br{background:#111120;color:#3a3a5c}
.dinfo{flex:1}.dtype{font-size:13px;font-weight:600;color:var(--text)}.ddow{font-size:11px;color:var(--muted);margin-top:2px}
.dright{display:flex;align-items:center;gap:8px}
.today-tag{font-size:9px;background:var(--acc);color:#000;padding:2px 7px;border-radius:20px;font-weight:700}
.chk{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;background:transparent;flex-shrink:0}
.chk.on{background:var(--green);border-color:var(--green)}.chk svg{display:none}.chk.on svg{display:block}
.chv{font-size:11px;color:var(--muted);transition:transform .2s;display:inline-block}
.day-card.open .chv{transform:rotate(180deg)}
.panel{max-height:0;overflow:hidden;transition:max-height .35s ease;border-top:0 solid var(--border)}
.day-card.open .panel{max-height:9000px;border-top-width:1px}
/* EXERCISE ITEMS */
.ex-list{padding:10px 12px 4px}
.ex-item{padding:10px;border-radius:10px;background:var(--dark);margin-bottom:8px;border:1px solid var(--border)}
.ex-header{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.ex-num{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.ef{background:#1e0d33;color:var(--purple)}.eb{background:#2d0a22;color:#f472b6}.el{background:#2d1500;color:var(--orange)}
.ex-name{font-size:12px;font-weight:600;color:var(--text);flex:1}
.ex-reps{font-size:11px;color:var(--muted);margin-top:1px}
.ex-tip{font-size:10px;color:#3a3a5c;margin-top:2px;font-style:italic}
.prev-info{font-size:10px;color:var(--orange);background:rgba(251,146,60,.08);border:1px solid rgba(251,146,60,.2);border-radius:6px;padding:5px 8px;margin-bottom:8px}
.prev-info b{color:var(--orange)}
.series-table{width:100%;border-collapse:collapse;font-size:11px}
.series-table th{color:var(--muted);font-weight:500;padding:3px 4px;text-align:center;font-size:10px}
.series-table td{padding:3px 4px;text-align:center}
.series-table input{width:52px;background:#0a0a0f;border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:10px;padding:3px 4px;text-align:center;outline:none;font-family:inherit;user-select:text}
.series-table input:focus{border-color:var(--acc)}
.sdone{background:var(--green)!important;border-color:var(--green)!important;color:#fff!important;font-weight:700}
.save-btn{width:100%;margin-top:8px;padding:7px;border-radius:8px;background:rgba(212,255,78,.1);border:1px solid rgba(212,255,78,.3);color:var(--acc);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.5px}
.save-btn:active{background:rgba(212,255,78,.2)}
/* CARDIO */
.cblk{margin:10px 12px 6px;padding:10px 12px;border-radius:10px;background:var(--dark);border:1px solid var(--border)}
.clbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.crow{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;flex-wrap:wrap;gap:2px}
.crow span:first-child{color:var(--muted)}.crow span:last-child{font-weight:500;color:var(--text);text-align:right}
.cnote{font-size:10px;color:#3a3a5c;margin-top:6px;font-style:italic}
.pace-box{background:#0a1522;border:1px solid #1a3a55;border-radius:8px;padding:8px 10px;margin-top:8px}
.pace-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}
.pace-row span:first-child{color:#4ab8ff}.pace-row span:last-child{color:var(--text);font-weight:500}
.clog-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 12px 4px}
.ci-blk{background:var(--dark);border:1px solid var(--border);border-radius:10px;padding:8px 10px}
.ci-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.ci-fields{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ci-f{display:flex;flex-direction:column;gap:3px}
.ci-f label{font-size:9px;color:var(--muted)}
.ci-f input,.ci-f select{background:#0a0a0f;border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:11px;padding:4px 6px;outline:none;font-family:inherit;width:100%;user-select:text}
.ci-f select option{background:#0a0a0f}
/* STRETCH */
.stretch-blk{margin:8px 12px 0;padding:10px 12px;border-radius:10px;background:#0a1a0a;border:1px solid #1a3a1a}
.stretch-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--green);margin-bottom:6px}
.stretch-item{font-size:11px;color:#6aaa6a;margin-bottom:3px;padding-left:8px}
/* NOTES */
.note-w{margin:8px 12px 12px;padding:8px 10px;border-radius:10px;background:var(--dark);border:1px solid var(--border)}
.note-l{font-size:10px;color:var(--muted);margin-bottom:4px}
.note-ta{width:100%;background:transparent;border:none;outline:none;font-size:12px;font-family:inherit;color:var(--text);resize:none;line-height:1.5;user-select:text}
/* NAV */
.bnav{flex-shrink:0;background:#0a0a0f;border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:10px 0 14px}
.nbtn{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;background:none;border:none;font-family:inherit;color:var(--muted);font-size:10px;padding:0 16px}
.nbtn.on{color:var(--acc)}.nico{font-size:20px}
/* PROGRESS */
.pg-wrap{padding:12px}
.pg-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.pg-card{background:var(--card);border-radius:12px;padding:12px;text-align:center}
.pg-num{font-size:24px;font-weight:700}.pg-lbl{font-size:10px;color:var(--muted);margin-top:3px}
.bar-w{background:var(--card);border-radius:12px;padding:14px;margin-bottom:8px}
.bar-t{font-size:12px;font-weight:600;color:var(--text);margin-bottom:10px}
.bar-r{margin-bottom:8px}
.bar-lr{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px}
.bar-tr{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.bar-f{height:100%;border-radius:3px;transition:width .5s}
.chart-wrap{background:var(--card);border-radius:12px;padding:14px;margin-bottom:8px}
.chart-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px}
.chart-filter-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.cfilter{padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:10px;cursor:pointer;font-family:inherit}
.cfilter.on{background:var(--acc);border-color:var(--acc);color:#000;font-weight:700}
.ex-filter-row{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;margin-bottom:10px}
.ex-filter-row::-webkit-scrollbar{display:none}
.exf{flex-shrink:0;padding:3px 8px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:9px;cursor:pointer;font-family:inherit;white-space:nowrap}
.exf.on{background:var(--purple);border-color:var(--purple);color:#fff}
.chart-canvas-wrap{position:relative;height:180px;width:100%}
canvas{width:100%!important}
.act-dist-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.act-card{background:var(--card);border-radius:12px;padding:12px}
.act-icon{font-size:24px;margin-bottom:4px}
.act-nums{display:flex;justify-content:space-between;align-items:flex-end;margin-top:6px}
.act-actual{font-size:20px;font-weight:700}
.act-target{font-size:10px;color:var(--muted)}
.act-bar-wrap{margin-top:6px}
/* TIPS */
.tip-wrap{padding:12px}
.tip-card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:8px;cursor:pointer}
.tip-num{font-size:10px;color:var(--muted);margin-bottom:4px}

.save-tag.show{opacity:1}

var TIPS=[
  {c:"Corrida",cc:"#4ab8ff",cb:"#0c2233",t:"Como o corpo adapta ao treino de corrida",b:"Quando voce comeca a correr regularmente, o corpo passa por adaptacoes profundas: <b>aumento da densidade capilar muscular</b>, <b>hipertrofia mitocondrial</b> e melhora da eficiencia cardiaca. Essas adaptacoes levam 4-8 semanas. Consistencia supera intensidade no inicio."},
  {c:"Corrida",cc:"#4ab8ff",cb:"#0c2233",t:"O que e pace e como melhorar",b:"Pace e o tempo por quilometro. Para melhorar: <b>80% do volume em Z2</b> (consegue falar frases) e <b>20% em Z4-5</b> (tiros). A regra dos <b>10%</b>: nao aumente distancia mais que isso por semana - previne a maioria das lesoes."},
  {c:"Corrida",cc:"#4ab8ff",cb:"#0c2233",t:"Cadencia: 170-180 passos por minuto",b:"Cadencia ideal fica entre 170-180 passos/min. Passadas curtas e rapidas reduzem impacto articular em ate 20%. Use metronomo no fone ou playlist com BPM especifico. Aumente gradualmente em 5-10% por semana."},
  {c:"Corrida",cc:"#4ab8ff",cb:"#0c2233",t:"Respiracao durante a corrida",b:"Tecnica mais eficiente: <b>inspirar por 3 passos, expirar em 2</b> (padrao 3:2). Distribui o impacto em ambos os lados - reduz caimbras laterais. Se nao consegue falar uma frase, esta em Z4+ - reduza o ritmo."},
  {c:"Corrida",cc:"#4ab8ff",cb:"#0c2233",t:"Como chegar nos primeiros 10km",b:"Protocolo: <b>fase 1</b> - corrida continua de 5km (4-6 semanas); <b>fase 2</b> - 7km (3-4 semanas); <b>fase 3</b> - 10km (2-3 semanas). Nunca aumente mais de 1-1.5km por semana."},
  {c:"Corrida",cc:"#4ab8ff",cb:"#0c2233",t:"Lesoes comuns e como evitar",b:"<b>Banda iliotibial</b>: fortaleça gluteos, foam roll lateral. <b>Canelite</b>: aumente volume devagar. <b>Fascite plantar</b>: alonga panturrilha diariamente. A maioria das lesoes vem de aumento brusco de volume."},
  {c:"Corrida",cc:"#4ab8ff",cb:"#0c2233",t:"Estrategia de prova nos 10km",b:"Use <b>negative split</b>: corra os primeiros 5km 10-15s/km mais devagar e acelere nos ultimos. Para quem fez 5km em 28min, mire entre 56-62min nos primeiros 10km de prova."},
  {c:"Corrida",cc:"#4ab8ff",cb:"#0c2233",t:"Corrida em calor e umidade",b:"Acima de 25 graus, o pace natural <b>aumenta 6-12s/km</b> para o mesmo esforco - normal. Hidrate mais e reduza o pace nos dias quentes. Aclimatacao leva 10-14 dias."},
  {c:"Cardio",cc:"#22c55e",cb:"#0a2010",t:"Zonas de frequencia cardiaca",b:"5 zonas: <b>Z1</b> (50-60%) recuperacao; <b>Z2</b> (60-70%) base aerobica; <b>Z3</b> (70-80%) resistencia; <b>Z4</b> (80-90%) limiar; <b>Z5</b> (90-100%) VO2max. A regra do polarizado: 80% em Z1-Z2 maximiza adaptacoes sem overtraining."},
  {c:"Cardio",cc:"#22c55e",cb:"#0a2010",t:"VO2max: preditor de longevidade",b:"<b>VO2max</b> e o maximo de O2 utilizado por min/kg. E o melhor preditor de saude cardiovascular e longevidade. Para aumentar: tiros de 4min a 90-95% FCmax. Acima de 50 ml/kg/min para homens = excelente condicionamento."},
  {c:"Cardio",cc:"#22c55e",cb:"#0a2010",t:"Brick training: bike mais corrida",b:"Treinar bike seguido de corrida e o <b>brick training</b>. Adapta o corpo a correr com pernas fatigadas. As primeiras quadras sao sempre dificeis - pesam por 5-10 min. Com consistencia, a transicao fica mais rapida."},
  {c:"Cardio",cc:"#22c55e",cb:"#0a2010",t:"HIIT vs LISS: quando usar",b:"<b>HIIT</b>: queima mais calorias, eleva metabolismo por horas. <b>LISS</b>: queima mais gordura diretamente, preserva musculo. Suas corridas intervaladas sao HIIT e a bike em Z2 e LISS. Combinar os dois e a estrategia mais eficiente."},
  {c:"Cardio",cc:"#22c55e",cb:"#0a2010",t:"Frequencia cardiaca de repouso",b:"FCR ideal para adultos ativos: abaixo de 60 bpm. Atletas de elite: 40 bpm. Meca ao acordar deitado. FCR acima de 70 pode indicar descondicionamento ou overtraining. Queda progressiva = adaptacao cardiovascular real."},
  {c:"Musculacao",cc:"#a78bfa",cb:"#1e0d33",t:"Hipertrofia: como o musculo cresce",b:"O musculo cresce por <b>microlesoes</b> seguidas de reparo. O crescimento ocorre <b>durante o descanso</b>, nao durante o treino. Sem proteina suficiente e sono de qualidade, o musculo nao se recupera e nao cresce."},
  {c:"Musculacao",cc:"#a78bfa",cb:"#1e0d33",t:"Series, reps e carga",b:"Para <b>hipertrofia</b>: 3-5 series de 6-15 rep, 60-90s de descanso. Para <b>forca</b>: 3-6 series de 1-5 rep, 3-5min. Volume semanal ideal: 10-20 series por grupo. Voce esta no intervalo correto (16-22 series)."},
  {c:"Musculacao",cc:"#a78bfa",cb:"#1e0d33",t:"Sobrecarga progressiva: principio #1",b:"O musculo so cresce se o estimulo aumentar. Estrategia: aumente 2.5-5kg quando completar todas as reps com boa tecnica. <b>Registrar cargas</b> - como voce faz neste app - e a unica forma de garantir progressao."},
  {c:"Musculacao",cc:"#a78bfa",cb:"#1e0d33",t:"Tempo sob tensao",b:"<b>TUT</b> ideal para hipertrofia: 40-70s por serie. 3s de descida e 1s de subida = 4s por rep. 12 reps = 48s - zona ideal. A fase excentrica (descida) e onde mais ocorre dano muscular produtivo para crescimento."},
  {c:"Musculacao",cc:"#a78bfa",cb:"#1e0d33",t:"Compostos vs isolados",b:"<b>Compostos</b> (supino, agachamento, remada) recrutam multiplos musculos. <b>Isolados</b> (rosca, extensora) focam um musculo. Estrategia: comece pelos compostos pesados, finalize com isolados em mais reps."},
  {c:"Musculacao",cc:"#a78bfa",cb:"#1e0d33",t:"Por que seu split funciona",b:"Segunda (peito/ombro/triceps), Terca (costas/biceps/trapezio), Sabado (pernas/gluteo). Permite 48-72h de recuperacao por grupo. Musculos sinergistas treinam juntos. Os dias fixos criam previsibilidade e consistencia."},
  {c:"Musculacao",cc:"#a78bfa",cb:"#1e0d33",t:"Tendoes e progressao segura",b:"Tendoes adaptam-se mais lentamente que musculos - levam <b>6-12 meses</b> para fortalecer. Progressao gradual de carga protege. Exercicios excentricos (descida lenta) fortalecem tendoes."},
  {c:"Nutricao",cc:"#fb923c",cb:"#2d1500",t:"Proteina: quanto voce precisa",b:"Para quem treina musculacao e cardio: <b>1.6-2.2g por kg</b> por dia. Para 80kg: 128-176g/dia. Fontes: frango (31g/100g), atum (26g/100g), ovos (6g/unidade), whey (25g/dose). Distribua em 4-5 refeicoes."},
  {c:"Nutricao",cc:"#fb923c",cb:"#2d1500",t:"Carboidratos e performance",b:"Combustivel principal acima de 70% FCmax. Para corridas acima de 60min: <b>30-60g de carbo por hora</b>. Pre-treino: refeicao com carbo 2-3h antes. Pos-treino: janela de 30-45min com carbo + proteina."},
  {c:"Nutricao",cc:"#fb923c",cb:"#2d1500",t:"Hidratacao: alem da agua",b:"Desidratacao de <b>2% do peso corporal</b> reduz performance em ate 20%. Protocolo: 500ml 2h antes, 150-250ml a cada 15-20min durante, 500ml/hora apos. Urina amarela clara = bem hidratado."},
  {c:"Nutricao",cc:"#fb923c",cb:"#2d1500",t:"Cafeina como ergogenico",b:"Dose eficaz: 3-6mg/kg, 30-60min antes. Reduz percepcao de esforco em 10-15%. Evite apos 14h (meia-vida de 5-6h). Ciclize: 5 dias de uso, 2 de pausa para evitar tolerancia."},
  {c:"Nutricao",cc:"#fb923c",cb:"#2d1500",t:"Creatina: o suplemento mais pesquisado",b:"<b>Creatina monohidratada</b> tem 500+ estudos confirmando eficacia. Dose: 3-5g/dia, todo dia. Melhora forca, potencia e composicao corporal. Sem efeitos colaterais comprovados em pessoas saudaveis."},
  {c:"Sono",cc:"#f472b6",cb:"#2d0a22",t:"Sono e crescimento muscular",b:"<b>80% da secrecao de GH</b> ocorre durante o sono profundo. Menos de 6h aumenta cortisol e reduz testosterona. O ideal e <b>7-9h por noite</b>. Consistencia no horario e mais importante que a duracao."},
  {c:"Sono",cc:"#f472b6",cb:"#2d0a22",t:"Como otimizar o sono para atletas",b:"Ambiente ideal: <b>quarto entre 17-19 graus</b>, escuro e silencioso. Evite luz azul 1h antes. Magnesio bisglicinato (300-400mg) a noite melhora qualidade do sono. Evite cafeina apos 14h."},
  {c:"Hormonios",cc:"#d4ff4e",cb:"#1a1a00",t:"Testosterona e musculacao",b:"Testosterona e o principal hormonio anabolico masculino. Treinos com exercicios compostos pesados elevam-na naturalmente. O que <b>reduz</b>: deficit calorico severo, overtraining, sono ruim, alcool excessivo."},
  {c:"Hormonios",cc:"#d4ff4e",cb:"#1a1a00",t:"Cortisol: o hormonio do estresse",b:"O <b>cortisol</b> e necessario para o exercicio mas cronicamente elevado e catabolico. Picos: treinos acima de 75min, deficit severo, sono ruim. Seu programa de 55-70min esta na faixa ideal."},
  {c:"Hormonios",cc:"#d4ff4e",cb:"#1a1a00",t:"Insulina e composicao corporal",b:"A <b>insulina</b> carrega glicose e aminoacidos para dentro das celulas. Pos-treino, a sensibilidade esta elevada - melhor momento para carbo + proteina. Treino de forca melhora sensibilidade insulinica a longo prazo."},
  {c:"Hormonios",cc:"#d4ff4e",cb:"#1a1a00",t:"Endorfinas e saude mental",b:"O exercicio libera <b>endorfinas, serotonina e dopamina</b>. O runner's high vem de endocanabinoides apos 20-30min em Z2-Z3. Exercicio regular e tao eficaz quanto antidepressivos leves em estudos clinicos."},
  {c:"Hormonios",cc:"#d4ff4e",cb:"#1a1a00",t:"IGF-1 e crescimento muscular",b:"O <b>IGF-1</b> estimula sintese proteica e inibe degradacao. Aumenta com: treino de forca, proteina adequada (especialmente leucina), sono e jejum moderado. E o mensageiro que traduz o estimulo do treino em crescimento."},
  {c:"Recuperacao",cc:"#22c55e",cb:"#0a1a10",t:"Recuperacao ativa vs passiva",b:"<b>Recuperacao ativa</b> (caminhada leve, mobilidade) acelera remocao de lactato melhor que repouso total. Nas suas quintas e sextas: 10-15min de mobilidade fazem diferenca real. Foam roller por 5-10min reduz dor."},
  {c:"Recuperacao",cc:"#22c55e",cb:"#0a1a10",t:"DOMS: dor muscular tardia",b:"<b>DOMS</b> aparece 24-72h apos o treino. Com o tempo, a dor diminui sem que os ganhos parem - e sinal de adaptacao. Tratamento: proteina, hidratacao, sono, movimento leve."},
  {c:"Recuperacao",cc:"#22c55e",cb:"#0a1a10",t:"Deload: a semana mais importante",b:"Deload a cada 4-6 semanas: reduza volume em 40-50% mantendo intensidade. E quando a supercompensacao ocorre. Sinais: performance caindo, sono ruim, irritabilidade."},
  {c:"Corpo",cc:"#fb923c",cb:"#1a1000",t:"Sistema cardiovascular e exercicio",b:"O coracao e um musculo que responde ao treino. Com aerobico regular, o <b>volume sistolico</b> aumenta, o coracao bate mais devagar para distribuir o mesmo volume. FC de repouso baixa = coracao mais eficiente."},
  {c:"Corpo",cc:"#fb923c",cb:"#1a1000",t:"Tipos de fibras musculares",b:"<b>Tipo I</b> (lentas): resistencia, ciclismo, maratona. <b>Tipo II</b> (rapidas): forca e velocidade. Seu programa hibrido (musculacao + cardio) treina ambos - otimo para saude geral e performance."},
  {c:"Corpo",cc:"#fb923c",cb:"#1a1000",t:"Articulacoes e exercicio",b:"Exercicio regular aumenta producao de liquido sinovial, lubrificando as articulacoes. Correr nao desgasta joelhos em pessoas saudaveis - fortalece tecidos ao redor. Problemas vem de excesso de volume ou ma tecnica."},
  {c:"Corpo",cc:"#fb923c",cb:"#1a1000",t:"Sistema linfatico e recuperacao",b:"O <b>sistema linfatico</b> remove residuos metabolicos dos tecidos. Nao tem bomba propria - depende da contracao muscular. Por isso movimento leve nos dias de descanso acelera a limpeza dos subprodutos do treino."},
  {c:"Corpo",cc:"#fb923c",cb:"#1a1000",t:"Mitocondrias e energia aerobica",b:"<b>Mitocondrias</b> convertem oxigenio em ATP. O treino aerobico aumenta sua densidade e eficiencia - por isso voce ganha folego. Mais mitocondrias = menor FC para o mesmo pace ao longo das semanas."},
  {c:"Corpo",cc:"#fb923c",cb:"#1a1000",t:"Metabolismo basal e musculo",b:"O <b>metabolismo basal</b> representa 60-70% do gasto total. Cada kg de musculo gasta ~13kcal/dia extra em repouso. Treino de forca melhora composicao corporal mesmo sem perda de peso na balanca."},
  {c:"Corpo",cc:"#fb923c",cb:"#1a1000",t:"Neuroplasticidade e movimento",b:"Cada movimento repetido fortalece conexoes neurais. Com pratica consistente, movimentos complexos se tornam automaticos. Tecnica correta no inicio e crucial - padroes errados tambem se consolidam."},
  {c:"Mentalidade",cc:"#d4ff4e",cb:"#1a1a00",t:"A ciencia dos habitos no esporte",b:"Habitos funcionam em loops: <b>gatilho - rotina - recompensa</b>. Gatilho consistente (horario fixo, roupa separada), execute e celebre a conclusao - ativa dopamina. Habitos levam em media <b>66 dias</b> para se automatizar."},

function gsc(dt,idx){
  var dw=dt.getDay();
  if(dw===4||dw===5)return{type:"rest"};
  if(dw===3||dw===0)return{type:"cardio",ph:CARDIO_PHASES[Math.min(Math.floor(idx/7),8)]};
  if(dw===1)return{type:"front"};
  if(dw===2)return{type:"back"};
  if(dw===6)return{type:"legs"};
  return{type:"rest"};
}
function tl(t){
  if(t==="rest")return"Descanso";
  if(t==="cardio")return"Cardio + Bike";
  if(t==="front")return"Peito . Ombro . Triceps";
  if(t==="back")return"Costas . Biceps . Trapezio";
  return"Pernas . Gluteo";
}
var DA=(function(){
  var a=[];
  for(var i=0;i<60;i++){
    var d=new Date(S0);d.setDate(d.getDate()+i);
    var sc=gsc(d,i);
    a.push({dt:d,idx:i,wk:Math.floor(i/7),tp:sc.type,ph:sc.ph||null});
  }
  return a;
})();
function dk(d){return new Date(d).toISOString().slice(0,10);}

  for(var i=0;i<DA.length;i++){var dd=new Date(DA[i].dt);dd.setHours(0,0,0,0);if(dd.getTime()===td.getTime()){AW=DA[i].wk;break;}}
  bT();rA();
}

function rW(){
  var n=document.getElementById("WN");n.innerHTML="";
  for(var w=0;w<9;w++){
    var b=document.createElement("button");
    b.className="wbtn"+(w===AW?" on":"");
    b.textContent="Sem "+(w+1);
    (function(ww){b.onclick=function(){AW=ww;rA();};})(w);
    n.appendChild(b);
  }
}
 
function cSt(){
  var td=new Date();td.setHours(0,0,0,0);
  var st=0;
  for(var i=59;i>=0;i--){
    var d=new Date(S0);d.setDate(d.getDate()+i);d.setHours(0,0,0,0);
    if(d>td)continue;
    if(DA[i].tp==="rest"){st++;continue;}
    if(ST.c[d.toISOString().slice(0,10)])st++;else break;
  }
  return st;
}
 
function rS(){
  var done=0,tot=0;
  for(var i=0;i<DA.length;i++){if(DA[i].tp==="rest")continue;tot++;if(ST.c[dk(DA[i].dt)])done++;}
  var st=cSt();
  var pct=tot>0?Math.round(done/tot*100):0;
  document.getElementById("sd").textContent=done;
  document.getElementById("sl").textContent=tot-done;
  document.getElementById("sp").textContent=pct+"%";
  document.getElementById("sn").textContent=st;
  var icon=st>=3?"\uD83D\uDD25":"\u2744\uFE0F";
  document.getElementById("si").textContent=icon;
}
 
function pK(day){
  var pi=day.idx-7;if(pi<0)return null;
  var pd=DA[pi];if(pd&&pd.tp===day.tp)return dk(pd.dt);return null;
}
 
function getSerieData(key,ei,si){
  var k=key+"-"+ei+"-"+si;
  return ST.se[k]||{done:false,kg:"",reps:""};
}
function setSerieData(key,ei,si,field,val){
  var k=key+"-"+ei+"-"+si;
  if(!ST.se[k])ST.se[k]={done:false,kg:"",reps:""};
  ST.se[k][field]=val;
  sv();
}
function toggleSerieDone(key,ei,si){
  var k=key+"-"+ei+"-"+si;

}

    +"<div class=\"act-card\"><div class=\"act-icon\">&#128692;</div><div style=\"font-size:10px;color:var(--muted)\">Bicicleta</div>"
    +"<div class=\"act-nums\"><span class=\"act-actual\" style=\"color:var(--orange)\">"+tbkm.toFixed(1)+"km</span><span class=\"act-target\">meta acum.</span></div>"
    +"<div class=\"act-bar-wrap\"><div class=\"bar-tr\"><div class=\"bar-f\" style=\"width:"+Math.min(100,tbkm/175*100)+"%;background:var(--orange)\"></div></div></div>"
    +"<div style=\"font-size:9px;color:var(--muted);margin-top:3px\">Meta 60 dias: ~175km</div></div>"
    +"</div>"
    // Bar progress
    +"<div class=\"bar-w\"><div class=\"bar-t\">Progresso geral</div>"
    +"<div class=\"bar-r\"><div class=\"bar-lr\"><span>Total</span><span>"+p+"%</span></div><div class=\"bar-tr\"><div class=\"bar-f\" style=\"width:"+p+"%;background:var(--acc)\"></div></div></div>"
    +"<div class=\"bar-r\"><div class=\"bar-lr\"><span>Cardio</span><span>"+pc+"%</span></div><div class=\"bar-tr\"><div class=\"bar-f\" style=\"width:"+pc+"%;background:var(--blue)\"></div></div></div>"
    +"<div class=\"bar-r\"><div class=\"bar-lr\"><span>Musculacao</span><span>"+pm+"%</span></div><div class=\"bar-tr\"><div class=\"bar-f\" style=\"width:"+pm+"%;background:var(--purple)\"></div></div></div>"
    +"</div>"
    // Charts
    +"<div class=\"chart-wrap\">"
    +"<div class=\"chart-title\">Progressao por treino</div>"
    +"<div class=\"chart-filter-row\">"
    +"<button class=\"cfilter"+(pgFilter==="all"?" on":"")+"\" onclick=\"setPgFilter('all')\">Tudo</button>"
    +"<button class=\"cfilter"+(pgFilter==="cardio"?" on":"")+"\" onclick=\"setPgFilter('cardio')\">Corrida</button>"
    +"<button class=\"cfilter"+(pgFilter==="bike"?" on":"")+"\" onclick=\"setPgFilter('bike')\">Bike</button>"
    +"<button class=\"cfilter"+(pgFilter==="front"?" on":"")+"\" onclick=\"setPgFilter('front')\">Peito</button>"
    +"<button class=\"cfilter"+(pgFilter==="back"?" on":"")+"\" onclick=\"setPgFilter('back')\">Costas</button>"
    +"<button class=\"cfilter"+(pgFilter==="legs"?" on":"")+"\" onclick=\"setPgFilter('legs')\">Pernas</button>"
    +"</div>"
    +"<div class=\"chart-canvas-wrap\"><canvas id=\"pgChart\"></canvas></div>"
    +"</div>"
    +"<div class=\"chart-wrap\">"
    +"<div class=\"chart-title\">Progressao por exercicio</div>"
    +"<div class=\"ex-filter-row\" id=\"exFilterRow\"></div>"
    +"<div class=\"chart-canvas-wrap\"><canvas id=\"pgExChart\"></canvas></div>"
    +"</div>";
 
  buildExFilterRow();
  setTimeout(buildCharts,100);
}
 
function setPgFilter(f){pgFilter=f;rPg();}
function setPgExFilter(f){pgExFilter=f;buildExFilterRow();setTimeout(buildCharts,60);}
 
function buildExFilterRow(){
  var row=document.getElementById("exFilterRow");
  if(!row)return;
  // All exercises from all types
  var exList=[];
  var types=["front","back","legs"];
  for(var ti=0;ti<types.length;ti++){
    var ea=EX[types[ti]];
    for(var ei=0;ei<ea.length;ei++){
      exList.push({name:ea[ei].name||ea[ei].n,type:types[ti],idx:ei});
    }
  }
  if(!pgExFilter&&exList.length>0)pgExFilter=exList[0].name;
  row.innerHTML="";
  for(var i=0;i<exList.length;i++){
    var ex=exList[i];
    var b=document.createElement("button");
    b.className="exf"+(pgExFilter===ex.name?" on":"");
    b.textContent=ex.name;
    (function(name){b.onclick=function(){setPgExFilter(name);};})(ex.name);
    row.appendChild(b);
  }
}
 
function buildCharts(){
  // Chart 1: main filter
  buildMainChart();
  buildExerciseChart();
}
 
function buildMainChart(){
  var ctx=document.getElementById("pgChart");if(!ctx)return;
  if(pgChart){pgChart.destroy();pgChart=null;}
  var labels=[],data=[],colors=[];
  // Build weekly data
  for(var w=0;w<9;w++){
    labels.push("S"+(w+1));
    var val=0;
    for(var i=0;i<DA.length;i++){
      var d=DA[i];
      if(d.wk!==w)continue;
      var k=dk(d.dt);
      if(!ST.c[k])continue;
      if(pgFilter==="all"&&d.tp!=="rest")val+=1;
      else if(pgFilter==="cardio"&&d.tp==="cardio"){var cl=ST.cl[k];val+=(cl&&cl.rk?parseFloat(cl.rk)||0:0);}
      else if(pgFilter==="bike"&&d.tp==="cardio"){var cl2=ST.cl[k];val+=(cl2&&cl2.bk?parseFloat(cl2.bk)||0:0);}
      else if(pgFilter===d.tp)val+=1;
    }
    data.push(Math.round(val*10)/10);
  }
  var label=pgFilter==="all"?"Treinos feitos":pgFilter==="cardio"?"km corridos":pgFilter==="bike"?"km bike":"Treinos feitos";
  var color=pgFilter==="cardio"?"#4ab8ff":pgFilter==="bike"?"#fb923c":pgFilter==="front"?"#a78bfa":pgFilter==="back"?"#f472b6":pgFilter==="legs"?"#fb923c":"#d4ff4e";
  pgChart=new Chart(ctx,{
    type:"bar",
    data:{labels:labels,datasets:[{label:label,data:data,backgroundColor:color+"33",borderColor:color,borderWidth:2,borderRadius:6}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.raw+(pgFilter==="cardio"||pgFilter==="bike"?" km":"");}}}},scales:{x:{ticks:{color:"#52527a",font:{size:10}},grid:{color:"#1e1e2e"}},y:{ticks:{color:"#52527a",font:{size:10}},grid:{color:"#1e1e2e"},beginAtZero:true}}}
  });
}
 
function buildExerciseChart(){
  var ctx=document.getElementById("pgExChart");if(!ctx)return;
  if(pgExChart){pgExChart.destroy();pgExChart=null;}
  if(!pgExFilter)return;
  // Find exercise
  var foundType="";var foundIdx=-1;
  var types=["front","back","legs"];
  for(var ti=0;ti<types.length;ti++){
    var ea=EX[types[ti]];
    for(var ei=0;ei<ea.length;ei++){
      if(ea[ei].n===pgExFilter){foundType=types[ti];foundIdx=ei;break;}
    }
    if(foundIdx>=0)break;
  }
  if(foundIdx<0)return;
  // Collect data per week: max weight * avg reps = volume score
  var wLabels=[],wKg=[],wReps=[],wVol=[];
  for(var w=0;w<9;w++){
    wLabels.push("S"+(w+1));
    var maxKg=0,sumReps=0,cnt=0;
    for(var i=0;i<DA.length;i++){
      var d=DA[i];
      if(d.wk!==w||d.tp!==foundType)continue;
      var k=dk(d.dt);
      var ex=EX[foundType][foundIdx];
      for(var si=0;si<ex.s;si++){
        var sd=getSerieData(k,foundIdx,si);
        if(sd.kg){var kg=parseFloat(sd.kg)||0;if(kg>maxKg)maxKg=kg;}
        if(sd.reps){sumReps+=parseInt(sd.reps)||0;cnt++;}
      }
    }
    wKg.push(maxKg);
    wReps.push(cnt>0?Math.round(sumReps/cnt):0);
    wVol.push(maxKg&&cnt>0?Math.round(maxKg*(sumReps/cnt)*10)/10:0);
  }
  pgExChart=new Chart(ctx,{
    type:"line",
    data:{labels:wLabels,datasets:[
      {label:"Carga max (kg)",data:wKg,borderColor:"#a78bfa",backgroundColor:"#a78bfa22",borderWidth:2,pointRadius:4,tension:0.3,yAxisID:"y"},
      {label:"Media reps",data:wReps,borderColor:"#4ab8ff",backgroundColor:"#4ab8ff22",borderWidth:2,pointRadius:4,tension:0.3,yAxisID:"y2"}
    ]},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},plugins:{legend:{labels:{color:"#8888aa",font:{size:10},boxWidth:12}}},scales:{x:{ticks:{color:"#52527a",font:{size:10}},grid:{color:"#1e1e2e"}},y:{ticks:{color:"#a78bfa",font:{size:10}},grid:{color:"#1e1e2e"},beginAtZero:true,title:{display:true,text:"kg",color:"#a78bfa",font:{size:9}}},y2:{position:"right",ticks:{color:"#4ab8ff",font:{size:10}},grid:{drawOnChartArea:false},beginAtZero:true,title:{display:true,text:"reps",color:"#4ab8ff",font:{size:9}}}}}
  });
}
 
function bT(){
  var c=document.getElementById("TL");
  for(var i=0;i<TIPS.length;i++){
    var tp=TIPS[i];
    var div=document.createElement("div");div.className="tip-card";
    div.innerHTML="<div class=\"tip-num\">"+(i+1)+" / 60</div>"
      +"<div class=\"tip-hdr\"><div class=\"tip-h\">"+tp.t+"</div>"
      +"<span class=\"tip-tag\" style=\"background:"+tp.cb+";color:"+tp.cc+"\">"+tp.c+"</span></div>"
      +"<div class=\"tip-body\" id=\"tb"+i+"\">"+tp.b+"</div>";
    (function(ii){div.onclick=function(){document.getElementById("tb"+ii).classList.toggle("open");};})(i);
    c.appendChild(div);
  }
}
 
function SV(v){
  document.querySelectorAll(".view").forEach(function(el){el.classList.remove("on");});
  document.querySelectorAll(".nbtn").forEach(function(el){el.classList.remove("on");});
  var vm={"t":"vt","p":"vp","d":"vd"};
  var nm={"t":"nb-t","p":"nb-p","d":"nb-d"};
  document.getElementById(vm[v]).classList.add("on");
  document.getElementById(nm[v]).classList.add("on");
  if(v==="p")setTimeout(buildCharts,150);
}
 
document.addEventListener("touchmove",function(e){
  if(!e.target.closest(".scroll-area,.week-row"))e.preventDefault();
},{passive:false});
 
ld();
 
</script>
